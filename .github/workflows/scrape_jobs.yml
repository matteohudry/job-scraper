name: Job Scraper à 12h (France)

on:
  schedule:
    - cron: '0 * * * *'  # Toutes les heures
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1  # ✅ Dernière version (compatible Node.js 24)

      - name: Set up Python
        uses: actions/setup-python@v5.0.0  # ✅ Dernière version (compatible Node.js 24)
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if it's 12:00 in Paris
        id: time_check
        run: |
          sudo apt-get update -y && sudo apt-get install -y tzdata
          sudo ln -fs /usr/share/zoneinfo/Europe/Paris /etc/localtime
          CURRENT_TIME=$(TZ=Europe/Paris date +%H:%M)
          if [ "$CURRENT_TIME" = "12:00" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        if: steps.time_check.outputs.run == 'true'
        run: python job_scraper.py
