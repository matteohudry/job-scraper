name: Job Scraper à 12h (France)

on:
  schedule:
    - cron: '0 * * * *'  # Déclenché **toutes les heures** (pour vérifier l'heure locale)
  workflow_dispatch:      # Lance manuellement si besoin

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if it's 12:00 in Paris
        id: time_check
        run: |
          # Installe le fuseau horaire Europe/Paris
          sudo apt-get update -y && sudo apt-get install -y tzdata
          sudo ln -fs /usr/share/zoneinfo/Europe/Paris /etc/localtime
          # Vérifie si l'heure actuelle à Paris est 12:00
          CURRENT_TIME=$(TZ=Europe/Paris date +%H:%M)
          if [ "$CURRENT_TIME" = "12:00" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        if: steps.time_check.outputs.run == 'true'
        run: python job_scraper.py
